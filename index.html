<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feyruz Baghirov - Software Developer</title>
  <meta name="description" content="Software developer based in Budapest. Upstream LLVM/Clang contributor. Building tools used by thousands of engineers at Ericsson.">

  <!-- Open Graph -->
  <meta property="og:title" content="Feyruz Baghirov - Software Developer">
  <meta property="og:description" content="Upstream LLVM/Clang contributor. Building tools used by ~3,000 engineers at Ericsson.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://feyruz.dev">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Feyruz Baghirov - Software Developer">
  <meta name="twitter:description" content="Upstream LLVM/Clang contributor. Building tools used by ~3,000 engineers at Ericsson.">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230a0a09'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-family='serif' font-size='18' font-style='italic' fill='%23d4a853'>fb</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #0a0a09;
      color: #ede9e0;
      font-family: 'Space Grotesk', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    a { text-decoration: none; }

    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    @keyframes glowPulse { 0%,100% { box-shadow: 0 0 8px rgba(212,168,83,0.4); } 50% { box-shadow: 0 0 16px rgba(212,168,83,0.7); } }

    .reveal { opacity:0; transform:translateY(28px); transition: opacity 0.75s cubic-bezier(0.16,1,0.3,1), transform 0.75s cubic-bezier(0.16,1,0.3,1); }
    .reveal.in { opacity:1; transform:translateY(0); }

    @media (max-width: 900px) {
      .hero-grid { grid-template-columns: 1fr !important; }
      .hero-photo { min-height: 55vw; border-right: none !important; border-bottom: 1px solid #252523 !important; order: -1; }
      .hero-content { padding: 72px 28px 48px !important; justify-content: flex-start !important; }
      .exp-grid { grid-template-columns: 1fr !important; }
      .exp-meta { padding-right: 0 !important; margin-bottom: 6px; }
      .exp-timeline-dot { display: none !important; }
      .exp-timeline-line { display: none !important; }
      .exp-body { padding-left: 0 !important; }
      .proj-featured { grid-template-columns: 1fr !important; }
      .proj-small { grid-template-columns: 1fr 1fr !important; }
      .about-grid { grid-template-columns: 1fr !important; }
      .about-sticky { position: static !important; }
      .contact-grid { grid-template-columns: 1fr !important; }
      .nav-inner { padding: 16px 24px !important; }
      .nav-links { gap: 20px !important; }
      .section-pad { padding: 64px 24px !important; }
    }
    @media (max-width: 520px) {
      .proj-small { grid-template-columns: 1fr !important; }
      .proj-small-item { border-right: none !important; border-bottom: 1px solid #252523; }
    }
  </style>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) { e.target.classList.add('in'); obs.unobserve(e.target); }
        });
      }, { threshold: 0.06 });
      setTimeout(() => document.querySelectorAll('.reveal').forEach(el => obs.observe(el)), 500);
    });
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ─── SCROLL PROGRESS ──────────────────────────────────────────── */
    const ScrollProgress = () => {
      const [pct, setPct] = useState(0);
      useEffect(() => {
        const onScroll = () => {
          const total = document.documentElement.scrollHeight - window.innerHeight;
          setPct(total > 0 ? (window.scrollY / total) * 100 : 0);
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);
      return (
        <div style={{
          position: 'fixed', top: 0, left: 0, zIndex: 300,
          height: 2, width: `${pct}%`,
          background: 'linear-gradient(90deg, #d4a853, rgba(212,168,83,0.6))',
          boxShadow: '0 0 10px rgba(212,168,83,0.5)',
          transition: 'width 0.08s linear',
          pointerEvents: 'none',
        }} />
      );
    };

    /* ─── NAV ──────────────────────────────────────────────────────── */
    const Nav = ({ active, onNav }) => {
      const [scrolled, setScrolled] = useState(false);
      const [menuOpen, setMenuOpen] = useState(false);

      useEffect(() => {
        const h = () => setScrolled(window.scrollY > 40);
        window.addEventListener('scroll', h, { passive: true });
        return () => window.removeEventListener('scroll', h);
      }, []);

      const handleNav = (id) => { setMenuOpen(false); onNav(id); };

      return (
        <>
          <nav style={{
            position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
            padding: '20px 48px',
            background: (scrolled || menuOpen) ? 'rgba(10,10,9,0.97)' : 'transparent',
            backdropFilter: (scrolled || menuOpen) ? 'blur(18px)' : 'none',
            WebkitBackdropFilter: (scrolled || menuOpen) ? 'blur(18px)' : 'none',
            borderBottom: (scrolled || menuOpen) ? '1px solid #252523' : '1px solid transparent',
            transition: 'background 0.4s, border-color 0.4s',
          }}>
            <button onClick={() => handleNav('home')} style={{
              fontFamily: "'JetBrains Mono', monospace", fontSize: 13,
              color: '#8a8780', background: 'none', border: 'none', cursor: 'pointer',
            }}>
              <span style={{ color: '#d4a853' }}>fb</span> / feyruz baghirov
            </button>

            {/* Desktop links */}
            <div className="nav-desktop" style={{ display: 'flex', gap: 32, alignItems: 'center' }}>
              {['experience','projects','about','contact'].map(id => (
                <NavLink key={id} id={id} active={active} onNav={handleNav} />
              ))}
              <a href="CV.pdf" download style={{
                fontFamily: "'JetBrains Mono', monospace", fontSize: 11,
                letterSpacing: '0.08em', textTransform: 'uppercase',
                border: '1px solid #333330', color: '#4a4845',
                padding: '5px 12px', display: 'inline-flex', alignItems: 'center', gap: 6,
                transition: 'all 0.2s', textDecoration: 'none',
              }}
              onMouseEnter={e => { e.currentTarget.style.borderColor='#d4a853'; e.currentTarget.style.color='#d4a853'; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor='#333330'; e.currentTarget.style.color='#4a4845'; }}>
                <svg width="10" height="11" viewBox="0 0 10 11" fill="none"><path d="M5 1v7M2 6l3 3 3-3M1 10h8" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                CV
              </a>
              <GitHubButton />
            </div>

            {/* Hamburger */}
            <button className="nav-hamburger" onClick={() => setMenuOpen(o => !o)} style={{
              display: 'none', background: 'none', border: 'none', cursor: 'pointer',
              padding: 4, flexDirection: 'column', gap: 5, alignItems: 'flex-end',
            }}>
              <span style={{ display: 'block', width: 22, height: 1, background: menuOpen ? '#d4a853' : '#8a8780', transition: 'all 0.2s', transform: menuOpen ? 'rotate(45deg) translate(4px, 4px)' : 'none' }} />
              <span style={{ display: 'block', width: 16, height: 1, background: menuOpen ? '#d4a853' : '#8a8780', transition: 'all 0.2s', opacity: menuOpen ? 0 : 1 }} />
              <span style={{ display: 'block', width: 22, height: 1, background: menuOpen ? '#d4a853' : '#8a8780', transition: 'all 0.2s', transform: menuOpen ? 'rotate(-45deg) translate(4px, -4px)' : 'none' }} />
            </button>
          </nav>

          {/* Mobile menu drawer */}
          <div className="nav-drawer" style={{
            position: 'fixed', top: 61, left: 0, right: 0, zIndex: 99,
            background: 'rgba(10,10,9,0.97)', backdropFilter: 'blur(18px)',
            borderBottom: menuOpen ? '1px solid #252523' : 'none',
            display: 'none',
            flexDirection: 'column',
            padding: menuOpen ? '24px 28px 32px' : '0 28px',
            gap: 0,
            maxHeight: menuOpen ? '400px' : '0',
            overflow: 'hidden',
            transition: 'max-height 0.35s cubic-bezier(0.16,1,0.3,1)',
          }}>
            {['experience','projects','about','contact'].map((id, i) => (
              <a key={id} href={`#${id}`}
                onClick={e => { e.preventDefault(); handleNav(id); }}
                style={{
                  fontFamily: "'JetBrains Mono', monospace", fontSize: 13,
                  color: active === id ? '#d4a853' : '#8a8780',
                  letterSpacing: '0.08em', textTransform: 'uppercase',
                  padding: '14px 0',
                  borderBottom: i < 3 ? '1px solid #1c1c1a' : 'none',
                  transition: 'color 0.2s',
                }}>{id}</a>
            ))}
            <a href="CV.pdf" download
              style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 13, color: '#8a8780', letterSpacing: '0.08em', textTransform: 'uppercase', padding: '14px 0', borderBottom: '1px solid #1c1c1a', transition: 'color 0.2s', display: 'flex', alignItems: 'center', gap: 8 }}>
              <svg width="11" height="12" viewBox="0 0 11 12" fill="none"><path d="M5.5 1v8M2 7l3.5 3.5L9 7M1 11h9" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
              Download CV
            </a>
            <a href="https://github.com/feyruzb" target="_blank" rel="noopener noreferrer"
              style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 13, color: '#d4a853', letterSpacing: '0.08em', textTransform: 'uppercase', paddingTop: 20, display: 'flex', alignItems: 'center', gap: 8 }}>
              <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
              </svg>
              GitHub ↗
            </a>
          </div>

          <style>{`
            @media (max-width: 768px) {
              .nav-desktop { display: none !important; }
              .nav-hamburger { display: flex !important; }
              .nav-drawer { display: flex !important; }
              nav { padding: 18px 24px !important; }
            }
          `}</style>
        </>
      );
    };

    const NavLink = ({ id, active, onNav }) => {
      const [hov, setHov] = useState(false);
      const isActive = active === id;
      return (
        <a href={`#${id}`}
          onClick={e => { e.preventDefault(); onNav(id); }}
          onMouseEnter={() => setHov(true)}
          onMouseLeave={() => setHov(false)}
          style={{
            fontFamily: "'JetBrains Mono', monospace", fontSize: 12,
            color: isActive ? '#d4a853' : hov ? '#ede9e0' : '#4a4845',
            letterSpacing: '0.08em', textTransform: 'uppercase',
            cursor: 'pointer', transition: 'color 0.2s',
            position: 'relative', paddingBottom: 3,
          }}>
          {id}
          <span style={{
            position: 'absolute', bottom: 0, left: 0, right: 0, height: 1,
            background: '#d4a853',
            transform: isActive ? 'scaleX(1)' : 'scaleX(0)',
            transformOrigin: 'left',
            transition: 'transform 0.3s cubic-bezier(0.16,1,0.3,1)',
          }} />
        </a>
      );
    };

    const GitHubButton = () => {
      const [hov, setHov] = useState(false);
      return (
        <a href="https://github.com/feyruzb" target="_blank" rel="noopener noreferrer"
          onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
          style={{
            fontFamily: "'JetBrains Mono', monospace", fontSize: 12,
            letterSpacing: '0.08em', textTransform: 'uppercase',
            border: `1px solid ${hov ? '#d4a853' : '#333330'}`,
            color: hov ? '#d4a853' : '#8a8780',
            padding: '6px 14px',
            display: 'inline-flex', alignItems: 'center', gap: 7,
            transition: 'all 0.2s', background: 'transparent',
          }}>
          <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
          GitHub
        </a>
      );
    };

    const useCountUp = (target, duration = 1200, delay = 0, isNum = true) => {
      const [val, setVal] = useState(isNum ? 0 : target);
      useEffect(() => {
        if (!isNum) return;
        const t = setTimeout(() => {
          const start = performance.now();
          const tick = (now) => {
            const p = Math.min((now - start) / duration, 1);
            const ease = 1 - Math.pow(1 - p, 3);
            setVal(Math.round(ease * target));
            if (p < 1) requestAnimationFrame(tick);
          };
          requestAnimationFrame(tick);
        }, delay);
        return () => clearTimeout(t);
      }, [target, duration, delay, isNum]);
      return val;
    };

    /* ─── HERO ─────────────────────────────────────────────────────── */
    const StatItem = ({ num, label, isNum, visible }) => {
      const counted = useCountUp(isNum ? num : 0, 1400, 600, isNum);
      return (
        <div>
          <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: 26, color: '#ede9e0' }}>
            {isNum ? counted : num}
          </div>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: '#4a4845', textTransform: 'uppercase', letterSpacing: '0.1em' }}>{label}</div>
        </div>
      );
    };

    const Hero = ({ onNav }) => {
      const [visible, setVisible] = useState(false);
      const [mouse, setMouse] = useState({ x: -999, y: -999 });
      const sectionRef = useRef(null);

      useEffect(() => { const t = setTimeout(() => setVisible(true), 80); return () => clearTimeout(t); }, []);

      const onMouseMove = useCallback((e) => {
        const r = sectionRef.current?.getBoundingClientRect();
        if (!r) return;
        setMouse({ x: e.clientX - r.left, y: e.clientY - r.top });
      }, []);

      const fade = (d) => ({
        opacity: visible ? 1 : 0,
        transform: visible ? 'translateY(0)' : 'translateY(22px)',
        transition: `opacity 0.7s cubic-bezier(0.16,1,0.3,1) ${d}ms, transform 0.7s cubic-bezier(0.16,1,0.3,1) ${d}ms`,
      });

      return (
        <section ref={sectionRef} className="hero-grid" onMouseMove={onMouseMove}
          style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', minHeight: '100vh', position: 'relative', overflow: 'hidden' }}>

          {/* Cursor glow overlay */}
          <div style={{
            position: 'absolute', inset: 0, pointerEvents: 'none', zIndex: 1,
            background: `radial-gradient(650px at ${mouse.x}px ${mouse.y}px, rgba(212,168,83,0.07), transparent 70%)`,
          }} />

          {/* LEFT: content */}
          <div className="hero-content" style={{
            padding: '80px 48px 64px', borderRight: '1px solid #252523',
            display: 'flex', flexDirection: 'column', justifyContent: 'flex-end',
            position: 'relative', zIndex: 2,
          }}>
            {/* Subtle grid overlay */}
            <div aria-hidden="true" style={{ position: 'absolute', inset: 0, pointerEvents: 'none', opacity: 0.025, backgroundImage: 'linear-gradient(#ede9e0 1px, transparent 1px), linear-gradient(90deg, #ede9e0 1px, transparent 1px)', backgroundSize: '80px 80px' }} />

            <div style={{ ...fade(0), display: 'flex', alignItems: 'center', gap: 12, marginBottom: 24 }}>
              <div style={{ width: 32, height: 1, background: '#d4a853', flexShrink: 0 }} />
              <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: '#d4a853', letterSpacing: '0.15em', textTransform: 'uppercase' }}>
                Software Developer · Budapest
              </span>
            </div>

            <div style={{ marginBottom: 32 }}>
              <div style={{ ...fade(100), fontFamily: "'Instrument Serif', serif", fontStyle: 'italic', fontSize: 'clamp(3.5rem, 6.5vw, 6.5rem)', lineHeight: 0.95, color: '#ede9e0' }}>Feyruz</div>
              <div style={{ ...fade(160), fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: 'clamp(3.5rem, 6.5vw, 6.5rem)', lineHeight: 0.95, color: '#d4a853' }}>Baghirov.</div>
            </div>

            <div style={{ ...fade(260), borderLeft: '2px solid #333330', paddingLeft: 20, marginBottom: 44 }}>
              <p style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 15, color: '#8a8780', lineHeight: 1.8, maxWidth: 380 }}>
                I write code that lands in <span style={{ color: '#d4a853', fontWeight: 500 }}>LLVM</span> and ships to <span style={{ color: '#d4a853', fontWeight: 500 }}>3,000</span> engineers. Sometimes I also teach it.
              </p>
            </div>

            <div style={{ ...fade(360), display: 'flex', gap: 12, marginBottom: 56, flexWrap: 'wrap' }}>
              <HeroButton onClick={() => onNav('experience')} primary>See My Work →</HeroButton>
              <HeroButton onClick={() => onNav('contact')} primary={false}>Get in Touch</HeroButton>
              <a href="CV.pdf" download style={{
                fontFamily: "'JetBrains Mono', monospace", fontSize: 12,
                textTransform: 'uppercase', letterSpacing: '0.08em',
                border: '1px solid #252523', color: '#4a4845',
                padding: '12px 20px', display: 'inline-flex', alignItems: 'center', gap: 8,
                transition: 'all 0.2s', textDecoration: 'none',
              }}
              onMouseEnter={e => { e.currentTarget.style.borderColor='#d4a853'; e.currentTarget.style.color='#d4a853'; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor='#252523'; e.currentTarget.style.color='#4a4845'; }}>
                <svg width="11" height="13" viewBox="0 0 11 13" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M5.5 1v8M2 6.5l3.5 3.5 3.5-3.5M1 12h9" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
                CV
              </a>
            </div>

            <div style={{ ...fade(460), display: 'flex', gap: 36 }}>
              {[{ num: '2yr', label: 'at Ericsson', isNum: false },{ num: 28, label: 'LLVM files', isNum: true },{ num: 'llvm:main', label: 'merged', isNum: false }].map(({ num, label, isNum }) => (
                <StatItem key={label} num={num} label={label} isNum={isNum} visible={visible} />
              ))}
            </div>
          </div>

          {/* RIGHT: photo */}
          <div className="hero-photo" style={{ position: 'relative', overflow: 'hidden' }}>
            <img src="img/photo.jpg" alt="Feyruz Baghirov" style={{ width: '100%', height: '100%', objectFit: 'cover', objectPosition: 'center top', filter: 'grayscale(20%) brightness(0.58)', display: 'block' }} />
            <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(135deg, rgba(10,10,9,0.45) 0%, transparent 55%, rgba(10,10,9,0.15) 100%)' }} />
            {/* Gold bottom accent */}
            <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: 2, background: 'linear-gradient(90deg, #d4a853 0%, transparent 70%)' }} />

            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: 'rgba(237,233,224,0.3)', writingMode: 'vertical-rl', position: 'absolute', bottom: 40, right: 40, letterSpacing: '0.08em' }}>Budapest · 2026</div>
          </div>
        </section>
      );
    };

    const HeroButton = ({ children, onClick, primary }) => {
      const [hov, setHov] = useState(false);
      return (
        <button onClick={onClick}
          onMouseEnter={() => setHov(true)}
          onMouseLeave={() => setHov(false)}
          style={{
            fontFamily: "'JetBrains Mono', monospace", fontSize: 12,
            textTransform: 'uppercase', letterSpacing: '0.08em',
            border: primary ? 'none' : `1px solid ${hov ? '#d4a853' : '#333330'}`,
            background: primary ? (hov ? '#ede9e0' : '#d4a853') : 'transparent',
            color: primary ? '#0a0a09' : (hov ? '#d4a853' : '#8a8780'),
            padding: '12px 24px', cursor: 'pointer',
            transition: 'all 0.2s',

              </h2>
              <p style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 15, color: '#8a8780', maxWidth: 440, lineHeight: 1.8 }}>
                Open to interesting projects, collaborations, and full-time opportunities.
              </p>
            </div>

            <div className="contact-grid" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 1, background: '#252523', border: '1px solid #252523' }}>
              {contacts.map(c => <ContactItem key={c.label} {...c} />)}
            </div>

            <div style={{ marginTop: 56, paddingTop: 28, borderTop: '1px solid #252523', display: 'flex', justifyContent: 'space-between', fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: '#4a4845' }}>
              <span>© 2026 Feyruz Baghirov</span>
              <span>feyruz.dev</span>
            </div>
          </div>
        </section>
      );
    };

    /* ─── APP ──────────────────────────────────────────────────────── */
    const App = () => {
      const [active, setActive] = useState('home');

      useEffect(() => {
        const sections = ['home','experience','projects','about','contact'];
        const observers = sections.map(id => {
          const el = document.getElementById(id);
          if (!el) return null;
          const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setActive(id); }, { threshold: 0.3 });
          obs.observe(el);
          return obs;
        });
        return () => observers.forEach(o => o && o.disconnect());
      }, []);

      const scrollTo = (id) => {
        const el = document.getElementById(id);
        if (el) {
          const top = el.getBoundingClientRect().top + window.scrollY;
          window.scrollTo({ top, behavior: 'smooth' });
        }
        setActive(id);
      };

      return (
        <div style={{ background: '#0a0a09', minHeight: '100vh', color: '#ede9e0' }}>
          <ScrollProgress />
          <Nav active={active} onNav={scrollTo} />
          <div id="home"><Hero onNav={scrollTo} /></div>
          <MarqueeBand />
          <div id="experience" className="reveal"><Experience /></div>
          <div id="projects" className="reveal"><Projects /></div>
          <div id="about" className="reveal"><About /></div>
          <div id="contact" className="reveal"><Contact /></div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
